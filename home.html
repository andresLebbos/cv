<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andres Lebbos</title>
  <style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f5f5f5;
    }

    h1 {
        margin: 40px 0;
        font-size: clamp(2em, 5vw, 3em);
    }

    .container {
        display: flex;
        justify-content: center;
        gap: 40px;
        padding: 20px;
    }

    .card {
        background: white;
        width: 150px;
        height: 150px;
        border-radius: 15px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: clamp(1em, 2.5vw, 1.2em);
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        text-decoration: none;
        color: inherit;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        text-decoration: none;
    }

    .card:visited {
        color: inherit;
    }

    .card:active {
        color: inherit;
    }

    .icon {
        font-size: clamp(1.5em, 4vw, 2em);
        margin-bottom: 10px;
    }

    @media (max-width: 600px) {
        h1 {
            margin: 20px 0;
        }

        .container {
            gap: 20px;
            flex-direction: column;
            align-items: center;
        }

        .card {
            width: 80%;
            max-width: 300px;
        }
    }
  </style>
</head>
<body>

  <h1>Andres Lebbos</h1>

  <div class="container">
    <a href="cv.pdf" class="card">
        <div class="icon">📄</div>
        CV
    </a>

    <a href="research.html" class="card">
        <div class="icon">🔬</div>
        Research
    </a>

    <a href="mailto:andres.lebbos@email.com" class="card">
        <div class="icon">✉️</div>
        Contact
    </a>
  </div>

</body>
</html>
